# Lokale dev-stack. Alle secrets in `.env.local` (naast dit compose-bestand
# op de host). Laravel in de container ziet die als `.env` via bind-mount.
# Voor `${VAR}`-substitutie in dit bestand start je met
#   `docker compose --env-file .env.local up`
# — of je gebruikt `scripts/dev.sh` dat 'm voor je meegeeft.
#
# Snelheid op Windows: de Windows C-schijf is via Docker Desktop's bind-mount
# op /mnt/c ver-uit-de-hand traag voor mappen met heel veel files. Vandaar dat
# `vendor/`, `node_modules/`, `bootstrap/cache/` en `storage/framework/` in
# named volumes zitten in plaats van in de bind-mount van de repo. Die mappen
# leven daarmee binnen het docker-volume-filesystem en zijn ~10× sneller om
# te lezen. Consequentie: `composer install` en `npm install` moet je in de
# container draaien; op de host zijn deze mappen leeg.

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-app
    env_file: .env.local
    volumes:
      - .:/var/www/html
      - ./.env.local:/var/www/html/.env:ro
      - app_vendor:/var/www/html/vendor
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_storage_framework:/var/www/html/storage/framework
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: rzvg-web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: rzvg-db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db-data:/var/lib/mysql
    ports: ["3307:3306"]

  node:
    image: node:22-alpine
    container_name: rzvg-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app_node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  selenium:
    image: selenium/standalone-chromium:latest
    container_name: rzvg-selenium
    shm_size: 2gb
    profiles: ["dusk"]

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: rzvg-mailpit
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-queue
    env_file: .env.local
    volumes:
      - .:/var/www/html
      - ./.env.local:/var/www/html/.env:ro
      - app_vendor:/var/www/html/vendor
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_storage_framework:/var/www/html/storage/framework
    command: php artisan queue:work database --tries=3 --sleep=3
    depends_on:
      - db

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-scheduler
    env_file: .env.local
    volumes:
      - .:/var/www/html
      - ./.env.local:/var/www/html/.env:ro
      - app_vendor:/var/www/html/vendor
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_storage_framework:/var/www/html/storage/framework
    command: php artisan schedule:work
    depends_on:
      - db

volumes:
  db-data:
  app_vendor:
  app_node_modules:
  app_bootstrap_cache:
  app_storage_framework:
