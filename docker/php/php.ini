; Dev-friendly PHP config. Optimized for Windows bind-mounts.

[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000

; Validate cached entries every 60s instead of every 2s.
; Reduces stat() calls on the slow Windows bind-mount.
opcache.validate_timestamps=1
opcache.revalidate_freq=60

; Realpath cache: holds resolved path lookups so repeated file_exists()
; etc. skip the bind-mount. Defaults are too small for vendor/ which has ~8000 files.
[PHP]
realpath_cache_size=16M
realpath_cache_ttl=600
