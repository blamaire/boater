# Acceptatie-stack. Draait naast de test-stack op dezelfde host:
# - Eigen app, db, queue en scheduler (containers krijgen prefix `rzvg-acc-`).
# - Geen eigen caddy — de caddy uit docker-compose.prod.yml (test) handelt
#   ook rzvg-acc.lamaire.nl af. Zie de site-blokken in docker/caddy/Caddyfile.
# - Volumes krijgen expliciete `name:` (zonder compose-prefix) zodat het
#   rzvg_acc_media_data-volume vanuit de test-stack via `external: true` te
#   benaderen is.
# - `rzvg_shared` is een extern netwerk (`docker network create rzvg_shared`)
#   dat de test-caddy én deze acc-app verbindt.
#
# Env: alle acc-vars in `.env.acc` naast dit compose-bestand. Laravel binnen
# de container ziet die via de bind-mount als `.env`. Voor `${VAR}`-substitutie
# in dit compose-bestand start je met `--env-file .env.acc` (zie deploy.sh).

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-acc-app
    restart: unless-stopped
    env_file: .env.acc
    volumes:
      - .:/var/www/html
      - ./.env.acc:/var/www/html/.env:ro
      - media_data:/var/www/html/storage/app/public/media
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rzvg_acc
      # Beschikbaar op rzvg-acc-app:9000 voor de caddy uit de test-stack.
      - rzvg_shared

  db:
    image: mysql:8.0
    container_name: rzvg-acc-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      # Alleen op localhost van de server, nooit publiek — bedoeld voor
      # DB-toegang via een SSH-tunnel (bv. DBeaver), niet vanaf buitenaf.
      # Andere hostpoort dan test (3306), want beide stacks draaien op
      # dezelfde server.
      - "127.0.0.1:3307:3306"
    networks:
      - rzvg_acc

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-acc-queue
    restart: unless-stopped
    command: php artisan queue:work database --tries=3 --sleep=3 --timeout=90
    env_file: .env.acc
    volumes:
      - .:/var/www/html
      - ./.env.acc:/var/www/html/.env:ro
      - media_data:/var/www/html/storage/app/public/media
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rzvg_acc

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rzvg-acc-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: .env.acc
    volumes:
      - .:/var/www/html
      - ./.env.acc:/var/www/html/.env:ro
      - media_data:/var/www/html/storage/app/public/media
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rzvg_acc

volumes:
  db_data:
    name: rzvg_acc_db_data
  media_data:
    name: rzvg_acc_media_data
  storage_logs:
    name: rzvg_acc_storage_logs

networks:
  rzvg_acc:
    driver: bridge
  rzvg_shared:
    external: true
