name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Geheimen-scan (Gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl, pcntl, opcache, zip, pdo_sqlite, sqlite3, gd, exif
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Bekende kwetsbaarheden (composer audit)
        run: composer audit

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Bekende kwetsbaarheden (npm audit)
        run: npm audit --audit-level=high

      - name: Build assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.local.example .env
          php artisan key:generate

      - name: Codestijl (Pint)
        run: vendor/bin/pint --test

      - name: Statische analyse (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Tests (Pest)
        run: vendor/bin/pest
