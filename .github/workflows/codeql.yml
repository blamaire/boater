name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'

jobs:
  analyze:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'actions']
        # PHP wordt door CodeQL ondersteund maar vergt extra build-tijd;
        # uitbreidbaar door 'php' toe te voegen wanneer nodig.

    steps:
      - uses: actions/checkout@v7

      - name: Initialiseer CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Analyseer
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
